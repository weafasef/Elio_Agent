<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elio — 客户端</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --primary: #e94560;
    --accent: #0f3460;
    --text: #eaeaea;
    --dim: #8892b0;
    --bubble-master: #2d4059;
    --bubble-elio: #3a1c3d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    background: var(--surface); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; transition: background .3s; }
  .status-dot.online { background: #51cf66; }
  .header-title { font-weight: 600; font-size: 15px; }
  .header-sub { font-size: 11px; color: var(--dim); }
  .header-right { margin-left: auto; display:flex; align-items:center; gap: 8px; }
  .audio-indicator {
    font-size: 11px; color: var(--dim); opacity: 0; transition: opacity .2s;
    cursor: pointer; user-select: none;
  }
  .audio-indicator.show { opacity: 1; }
  .audio-indicator.playing { color: var(--primary); animation: pulse .6s infinite alternate; }
  @keyframes pulse { from { opacity: .6; } to { opacity: 1; } }

  #messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 85%; animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.master { align-self: flex-end; }
  .msg.elio { align-self: flex-start; }

  .bubble { padding: 10px 14px; border-radius: 14px; line-height: 1.45; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.master .bubble { background: var(--bubble-master); border-bottom-right-radius: 4px; }
  .msg.elio .bubble { background: var(--bubble-elio); border-bottom-left-radius: 4px; }
  .subtitle { font-size: 12px; color: var(--dim); margin-top: 4px; padding-left: 4px; border-left: 2px solid var(--primary); }
  .tool-tag { font-size: 11px; color: var(--dim); background: var(--accent); padding: 2px 6px; border-radius: 6px; }
  .time-tag { font-size: 10px; color: var(--dim); margin-top: 2px; align-self: center; }

  #input-area { background: var(--surface); padding: 10px 16px; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  #input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg); color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
  #input-area input:focus { border-color: var(--primary); }
  #input-area button { padding: 10px 18px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; transition: opacity .2s; }
  #input-area button:hover { opacity: .85; }
  #input-area button:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="status-dot"></div>
  <div><div class="header-title">Elio</div><div class="header-sub" id="status-text">连接中…</div></div>
  <div class="header-right">
    <span class="audio-indicator" id="audio-ind" title="点击重播">🔊</span>
  </div>
</header>

<div id="messages"></div>

<div id="input-area">
  <input id="msg-input" placeholder="和 Elio 说话…" autofocus>
  <button id="send-btn" disabled>发送</button>
</div>

<audio id="player" preload="auto"></audio>

<script>
const WS_URL = `ws://${location.host}/ws/elio`;
const AUDIO_LAST = '/audio/last';
const AUDIO_BASE = '';

const $ = s => document.querySelector(s);
const messagesEl = $('#messages');
const inputEl = $('#msg-input');
const sendBtn = $('#send-btn');
const statusDot = $('#status-dot');
const statusText = $('#status-text');
const audioInd = $('#audio-ind');
const player = $('#player');

let ws = null, reconnectTimer = null, elioBuffer = '';
let lastPlayedFile = null;
let lastKnownAudio = null; // { audio, audioFile, subtitle }

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addElioBubble(ja, zh, toolName) {
  const div = document.createElement('div');
  div.className = 'msg elio';

  if (toolName) {
    const tag = document.createElement('span');
    tag.className = 'tool-tag';
    tag.textContent = `🔧 ${toolName}`;
    div.appendChild(tag);
  }

  if (ja) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = ja;
    div.appendChild(bubble);
  }
  if (zh) {
    const sub = document.createElement('div');
    sub.className = 'subtitle';
    sub.textContent = zh;
    div.appendChild(sub);
  }
  messagesEl.appendChild(div);
  scrollBottom();
}

function addMasterBubble(text) {
  const div = document.createElement('div');
  div.className = 'msg master';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollBottom();
}

function addTimeTag(text) {
  const div = document.createElement('div');
  div.className = 'time-tag';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollBottom();
}

function setOnline(online) {
  statusDot.classList.toggle('online', online);
  statusText.textContent = online ? '已连接' : '断开 — 重连中…';
  sendBtn.disabled = !online;
}

function setAudioPlaying(playing) {
  audioInd.classList.toggle('playing', playing);
}

// ── Parse speech blocks ───────────────────────────────────────────────
function parseSpeech(text) {
  const jaMatch = text.match(/<ja>([\s\S]*?)<\/ja>/);
  const zhMatch = text.match(/<zh>([\s\S]*?)<\/zh>/);
  if (jaMatch && zhMatch) return { ja: jaMatch[1].trim(), zh: zhMatch[1].trim() };
  // Fallback: has Japanese?
  const stripped = text.replace(/\[调用工具:[^\]]*\]/g, '').replace(/<personality-mode>[^<]*<\/personality-mode>/g, '').trim();
  if (/[぀-ゟ゠-ヿ]/.test(stripped)) return { ja: stripped, zh: '' };
  return null;
}

// ── Audio ──────────────────────────────────────────────────────────────
async function fetchLastAudio() {
  try {
    const res = await fetch(AUDIO_LAST, { signal: AbortSignal.timeout(3000) });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function tryPlayAudio() {
  const info = await fetchLastAudio();
  if (!info || !info.audioFile) return;

  // Already played this file?
  if (info.audioFile === lastPlayedFile) return;

  lastPlayedFile = info.audioFile;
  lastKnownAudio = info;

  const audioUrl = AUDIO_BASE + info.audio;
  player.src = audioUrl;
  player.load();

  audioInd.classList.add('show');
  setAudioPlaying(true);

  try {
    await player.play();
    audioInd.textContent = '🔊';
  } catch (e) {
    console.warn('Audio autoplay blocked:', e);
    audioInd.textContent = '🔇 点击播放';
  }
}

player.onended = () => setAudioPlaying(false);
player.onerror = () => { setAudioPlaying(false); audioInd.textContent = '⚠️'; };

audioInd.addEventListener('click', () => {
  if (player.paused && player.src) {
    player.play().catch(() => {});
    setAudioPlaying(true);
  }
});

// ── WebSocket ──────────────────────────────────────────────────────────
function connect() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }

  ws.onopen = () => {
    setOnline(true);
  };

  ws.onclose = () => {
    setOnline(false);
    scheduleReconnect();
  };

  ws.onerror = () => ws?.close();

  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }

    switch (m.type) {
      case 'connected': break;
      case 'content_start':
        if (m.blockType === 'text') elioBuffer = '';
        break;
      case 'content_delta':
        if (m.text) elioBuffer += m.text;
        break;
      case 'tool_use_complete':
        addElioBubble(null, null, m.toolName);
        break;
      case 'message_complete':
        if (elioBuffer) {
          const speech = parseSpeech(elioBuffer);
          if (speech) {
            addElioBubble(speech.ja, speech.zh || undefined);
            // Poll for audio — slight delay so server has time to write file
            setTimeout(tryPlayAudio, 500);
          } else if (!elioBuffer.includes('[调用工具') && !elioBuffer.includes('<personality-mode')) {
            addElioBubble(elioBuffer, null);
          }
        }
        elioBuffer = '';
        break;
      case 'error':
        addElioBubble('❌ ' + (m.message || '错误'), null);
        break;
    }
  };
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, 3000);
}

// ── Send ──────────────────────────────────────────────────────────────
function send() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMasterBubble(text);
  ws.send(JSON.stringify({ type: 'user_message', content: text }));
  inputEl.value = '';
  inputEl.focus();
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

connect();
</script>
</body>
</html>
